<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 1200px; 
  height: 500px; 
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.banner {
  width: 1200px;
  height: 500px;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated grid pattern */
.grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glowing orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.4;
}
.orb1 { width: 300px; height: 300px; background: #6366f1; top: -50px; right: 100px; }
.orb2 { width: 250px; height: 250px; background: #8b5cf6; bottom: -80px; left: 150px; }
.orb3 { width: 200px; height: 200px; background: #06b6d4; top: 50px; left: 400px; opacity: 0.25; }

/* Node network */
.nodes {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}
.node {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(99,102,241,0.8);
}
.line {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, rgba(99,102,241,0.4), rgba(139,92,246,0.1));
  transform-origin: left center;
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  color: white;
}
.title {
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -2px;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 22px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
}
.tagline {
  margin-top: 24px;
  font-size: 15px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Decorative dots */
.dots {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
}
.dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
}
.dot.active { background: rgba(99,102,241,0.8); }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  
  <!-- Decorative nodes -->
  <div class="nodes">
    <div class="node" style="top:80px;left:120px;"></div>
    <div class="node" style="top:150px;left:200px;"></div>
    <div class="node" style="top:60px;left:280px;"></div>
    <div class="node" style="top:200px;left:100px;"></div>
    <div class="node" style="top:350px;left:160px;"></div>
    <div class="node" style="top:300px;left:260px;"></div>
    <div class="node" style="top:400px;left:350px;"></div>
    <div class="node" style="top:100px;right:150px;"></div>
    <div class="node" style="top:180px;right:220px;"></div>
    <div class="node" style="top:80px;right:300px;"></div>
    <div class="node" style="top:300px;right:120px;"></div>
    <div class="node" style="top:380px;right:200px;"></div>
    <div class="node" style="top:250px;right:280px;"></div>
    
    <!-- Lines connecting nodes -->
    <div class="line" style="top:83px;left:126px;width:90px;transform:rotate(40deg);"></div>
    <div class="line" style="top:153px;left:206px;width:85px;transform:rotate(-60deg);"></div>
    <div class="line" style="top:203px;left:106px;width:110px;transform:rotate(65deg);"></div>
    <div class="line" style="top:303px;left:166px;width:100px;transform:rotate(-25deg);"></div>
    <div class="line" style="top:353px;left:266px;width:100px;transform:rotate(25deg);"></div>
    <div class="line" style="top:103px;right:216px;width:80px;transform:rotate(55deg);"></div>
    <div class="line" style="top:183px;right:226px;width:70px;transform:rotate(-70deg);"></div>
    <div class="line" style="top:303px;right:216px;width:90px;transform:rotate(40deg);"></div>
  </div>
  
  <div class="content">
    <div class="title">AITools</div>
    <div class="subtitle">Honest Reviews for Solopreneurs</div>
    <div class="tagline">We test AI tools so you don't have to</div>
  </div>
  
  <div class="dots">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
</body>
</html>
